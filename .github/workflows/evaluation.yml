name: Valutazione Automatica OpenOffice

on:
  workflow_dispatch:

jobs:
  evaluate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Imposta Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Installa dipendenze
        run: pip install -r requirements.txt

      - name: Esegui lo script di valutazione
        run: python src/evaluation.py

      - name: Verifica la presenza di report.csv
        run: |
          ls -la  # Mostra tutti i file nella directory corrente
          if [ -f "report.csv" ]; then echo "report.csv found"; else echo "report.csv not found"; fi

      - name: Commit dei risultati
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add report.csv
          git commit -m "Aggiunti report valutazione"
          git push
