name: OpenOffice Automatic Evaluation

on:
  workflow_dispatch:

jobs:
  evaluate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Run evaluation inside a LibreOffice container
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace \
          --workdir /workspace \
          collabora/code:latest bash -c "
          apt update &&
          apt install -y python3-pip python3-uno &&
          pip3 install pandas &&
          libreoffice --headless --accept='socket,host=localhost,port=2002;urp;' &
          sleep 5 && python3 src/evaluation.py"

      - name: Commit results
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add report.csv
          git commit -m "Add Evaluation Report"
          git push || echo "No changes to commit"
