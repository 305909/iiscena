name: OpenOffice Automatic Evaluation

on:
  workflow_dispatch:

jobs:
  evaluate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install LibreOffice
        run: |
          sudo apt update
          sudo apt install -y libreoffice python3-pip python3-uno

      - name: Install Python dependencies
        run: pip3 install pandas

      - name: Run LibreOffice in headless mode and evaluation
        run: |
          libreoffice --headless --accept="socket,host=localhost,port=2002;urp;" &
          sleep 5  # Wait for LibreOffice
          python3 src/evaluation.py

      - name: Commit results
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add report.csv
          git commit -m "Add Evaluation Report"
          git push || echo "No changes to commit"
